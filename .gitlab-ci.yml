image: rust:latest

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  RUSTFLAGS: "-C debuginfo=0"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - target/
    - Cargo.lock
    - .cargo/

stages:
  - lint
  - test

lint:
  stage: lint
  script:
    - rustup component add clippy rustfmt
    - cargo fmt -- --check
    - cargo clippy -- -D warnings
  allow_failure: true

test:
  stage: test
  script:
    - cargo install cargo-insta --locked
    - CI=true cargo test -- --nocapture
  artifacts:
    paths:
      - tests/snapshots/
    when: on_failure
    expire_in: 1 week