image: rust:latest

stages:
  - lint
  - test

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .cargo/registry/
    - .cargo/git/
    - target/
    - Cargo.lock

.before_script:
  - rustup component add rustfmt clippy

lint:
  stage: lint
  script:
    - cargo fmt -- --check
    - cargo clippy -- -D warnings
  tags:
    - main
  allow_failure: true

test:
  stage: test
  script:
    - cargo install cargo-insta --locked 2>/dev/null || true

    - CI=true cargo test -- --nocapture

    - cargo --version
    - rustc --version
  tags:
    - main
  artifacts:
    paths:
      - tests/snapshots/
    when: on_failure
    expire_in: 1 week