image: ubuntu:22.04

stages:
  - test

test:
  stage: test
  script:
    - apt-get update && apt-get install -y curl build-essential
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source $HOME/.cargo/env
    - cargo install cargo-insta --locked
    - CI=true cargo test