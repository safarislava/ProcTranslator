stages:
  - lint
  - test

lint:
  stage: lint
  script:
    - cargo fmt -- --check
    - cargo clippy -- -D warnings
  allow_failure: true

test:
  stage: test
  script:
    - cargo install cargo-insta --locked
    - CI=true cargo test -- --nocapture
  cache:
    paths:
      - target/
      - Cargo.lock
  tags:
    - shell